services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    ports:
      - "8001:8000"

  ddb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ENDPOINT=http://dynamodb:8000
        TABLE=atl-news-articles
        echo "waiting for dynamodb-local..."
        for i in $$(seq 1 30); do
          if aws --endpoint-url $$ENDPOINT dynamodb list-tables >/dev/null 2>&1; then
            echo "dynamodb-local ready"
            break
          fi
          sleep 1
        done
        if aws --endpoint-url $$ENDPOINT dynamodb describe-table --table-name $$TABLE >/dev/null 2>&1; then
          echo "table $$TABLE already exists"
        else
          echo "creating table $$TABLE"
          aws --endpoint-url $$ENDPOINT dynamodb create-table \
            --table-name $$TABLE \
            --attribute-definitions \
              AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
              AttributeName=gsi1pk,AttributeType=S AttributeName=gsi1sk,AttributeType=S \
            --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
            --global-secondary-indexes "[{\"IndexName\":\"gsi1\",\"KeySchema\":[{\"AttributeName\":\"gsi1pk\",\"KeyType\":\"HASH\"},{\"AttributeName\":\"gsi1sk\",\"KeyType\":\"RANGE\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]" \
            --billing-mode PAY_PER_REQUEST \
            >/dev/null
        fi

  fetcher:
    build: ./backend
    depends_on:
      ddb-init:
        condition: service_completed_successfully
    environment:
      ATL_STORE_BACKEND: dynamodb
      ATL_DYNAMODB_TABLE: atl-news-articles
      ATL_DYNAMODB_ENDPOINT_URL: http://dynamodb:8000
      ATL_AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
    command: ["python", "-m", "app.fetcher_cli"]

  api:
    build: ./backend
    depends_on:
      fetcher:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      ATL_STORE_BACKEND: dynamodb
      ATL_DYNAMODB_TABLE: atl-news-articles
      ATL_DYNAMODB_ENDPOINT_URL: http://dynamodb:8000
      ATL_AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
